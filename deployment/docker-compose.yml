version: '3.8'

services:
  insightpilot-app:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    container_name: insightpilot_platform
    ports:
      - "8501:8501"
      - "8000:8000"
    volumes:
      - ../database:/app/database
      - ../data:/app/data
      - ../models:/app/models
    environment:
      - PYTHONPATH=/app
      - DATABASE_PATH=/app/database/insightpilot.db
    restart: unless-stopped
